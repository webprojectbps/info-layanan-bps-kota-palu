<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informasi Layanan BPS Kota Palu</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root {
  --bps-blue: #005baa;
  --bps-dark: #003f7f;
  --bps-light: #e8f1fb;
  --bps-accent: #f4a700;
}

body { margin:0; font-family:sans-serif; }

/* ===== HERO ===== */
.hero-carousel {
  width: 100%;
  overflow: hidden;
  position: relative;
}

.hero-carousel-track {
  display: flex;
  width: 200%;
  transition: transform 0.65s cubic-bezier(.77,0,.18,1);
}

.hero-slide {
  width: 100vw;
  flex-shrink: 0;
}

/* SLIDE 1 */
.hero-slide-welcome {
  background: linear-gradient(135deg, var(--bps-dark), var(--bps-blue));
  color: white;
  padding: 100px 20px;
  text-align: center;
}

/* SLIDE 2 */
.hero-slide-poster {
  min-height: 420px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;

  background: linear-gradient(
    to bottom,
    #e06500 0%,
    #f4a700 35%,
    #f4a700 65%,
    #e06500 100%
  );
}

.hero-slide-poster::before {
  content: "";
  position: absolute;
  top: 0;
  height: 80px;
  width: 100%;
  background: linear-gradient(to bottom, rgba(224,101,0,0.8), transparent);
}

.hero-slide-poster::after {
  content: "";
  position: absolute;
  bottom: 0;
  height: 80px;
  width: 100%;
  background: linear-gradient(to top, rgba(224,101,0,0.8), transparent);
}

.hero-slide-poster img {
  max-width: 90%;
  max-height: 340px;
  z-index: 1;
}

/* DOT */
.carousel-dots {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
}

.carousel-dot {
  width: 10px;
  height: 10px;
  background: #fff;
  border: none;
  border-radius: 50%;
  margin: 0 5px;
  opacity: 0.5;
}

.carousel-dot.active {
  opacity: 1;
}

/* RESPONSIVE */
@media (max-width:768px){
  .hero-slide-poster {
    min-height: 260px;
  }
  .hero-slide-poster img {
    max-height: 200px;
  }
}
</style>
</head>

<body>

<div class="hero-carousel" id="heroCarousel">
  <div class="hero-carousel-track" id="carouselTrack">

    <!-- SLIDE 1 -->
    <div class="hero-slide hero-slide-welcome">
      <h1>Selamat Datang di BPS Kota Palu</h1>
    </div>

    <!-- SLIDE 2 -->
    <div class="hero-slide hero-slide-poster">
      <img src="img/posterbps.png">
    </div>

  </div>

  <!-- DOT -->
  <div class="carousel-dots">
    <button class="carousel-dot active" onclick="carouselGo(0)"></button>
    <button class="carousel-dot" onclick="carouselGo(1)"></button>
  </div>
</div>

<script>
(function() {
  const track = document.getElementById('carouselTrack');
  const dots  = document.querySelectorAll('.carousel-dot');
  const total = 2;
  let cur = 0;

  function goTo(n) {
    cur = (n + total) % total;

    /* FIX FINAL */
    track.style.transform = 'translateX(-' + (cur * 100) + 'vw)';

    dots.forEach((d,i)=>{
      d.classList.toggle('active', i === cur);
    });
  }

  function next(){
    goTo(cur+1);
  }

  window.carouselGo = goTo;

  setInterval(next, 4000);
})();
</script>

</body>
</html>
